constants:
  Te: 5.0
  freq: 90e9
  z: 1.19
coords:
  dr: '2.0'
  dz: 2.0
  r_map: 3.0*60
  x0: Angle('11 42 47.44 hours').to(u.radian).value
  y0: Angle('15:27:13.10 degrees').to(u.radian).value
datasets:
  mustang2:
    beam:
      amp1: 0.9808
      amp2: 0.0192
      fwhm1: '9.735'
      fwhm2: '32.627'
    copy_noise: false
    dograd: false
    funcs:
      get_files: mf.get_files
      get_info: mf.get_info
      load: mf.load_tods
      load_tods: mf.load_tods
      make_beam: mf.make_beam
      postfit: mf.postfit
      postproc: mf.postproc
      preproc: mf.preproc
    minkasi_noise:
      args: '[]'
      class: minkasi.mapmaking.noise.NoiseSmoothedSVD
      kwargs: '{''fwhm'':10}'
    noise:
      args: '[]'
      class: jn.NoiseSmoothedSVD
      kwargs: '{''fwhm'':10}'
    npass: 1
    prefactor: float(wu.get_da(cfg['constants']['z'])*wu.y2K_RJ(90e9, cfg['constants']['Te'])*wu.XMpc/wu.me)
fit: true
fitting:
  chitol: 1e-5
  maxiter: 10
imports:
  astropy.coordinates:
  - Angle
  astropy.units: u
  jitkasi.noise: jn
  witch.external.minkasi.funcs: mf
map: true
mem_starved: false
model:
  structures:
    nonpara:
      n_rbins: 5
      parameters:
        amps:
          to_fit: true
          value: jnp.array([8.387e5, 4.099e4, 1.233e2, 1.39, 0.0])
        c:
          to_fit: true
          value: 0
        dx_1:
          to_fit: false
          value: 0.0
        dy_1:
          to_fit: false
          value: 0.0
        dz_1:
          to_fit: false
          value: 0.0
        pows:
          to_fit: true
          value: jnp.array([-4.27, -3.65, -2.31, -1.01, -4])
        rbins:
          value: (0,30,60, 120, 180)
        z:
          to_fit: false
          value: 0.25
      structure: nonpara_power
    ps_gauss:
      parameters:
        amp_g:
          to_fit: true
          value: 0.001305594365157566
        dx_g:
          priors:
          - -10.0
          - 10.0
          to_fit: true
          value: 1.838875992189231
        dy_g:
          priors:
          - -13.0
          - 5.0
          to_fit: true
          value: -3.8776721594142134
        sigma:
          value: 5.096751126087345
      structure: gaussian
  unit_conversion: float(wu.get_da(constants['z'])*wu.y2K_RJ(constants['freq'], constants['Te'])*wu.XMpc/wu.me)
model_map: true
n_rounds: 4
name: MOOJ1142
path:
  subdir: nonpara
paths:
  glob: Signal_TOD*.fits
  ndo: false
  odo: false
  outroot: ''
  subdir: ''
  tods: MOOJ1142
sim: false
sub: true
wnoise: false
